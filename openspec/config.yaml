conventions:
  package_manager: pnpm@11.9.0
  architecture: Next.js App Router
  routing: App Router with route groups
  component_pattern: Atomic Design with shadcn/ui
  state_management: Zustand for global state
  form_pattern: React Hook Form + Zod + shadcn/ui FormField
  styling: Tailwind CSS utility-first, mobile-first
  dark_mode: next-themes with class strategy
  api_pattern: Next.js API Routes with Zod validation
  auth_pattern: JWT with httpOnly cookies, separate access/refresh tokens; AuthSessionProvider bootstraps from /api/auth/me + sliding refresh
  multi_tenancy: Company-based isolation with getCompanyFilter()
  role_based_access: 6-tier role system (REPORT_VIEWER to DEVELOPER)
  database_pattern: Prisma ORM with soft-delete and audit logs
  security: Rate limiting, bcrypt hashing, JWT secrets from env
  branding: cuenti time; logos from https://app-work.cuenti.co/brand/ (logo-dark.svg, logo-simbolo.svg) via src/lib/brand.ts
  default_position: On company/account creation, auto-create Position name "general"
  geofence_policy: Enforce GPS geofence only on mobile clients (deviceClass mobile); desktop skips GPS requirement

architecture_patterns:
  - Multi-tenant SaaS with company isolation
  - Role-based access control (6 roles)
  - JWT authentication with refresh tokens and client session bootstrap
  - Soft-delete pattern (status/active fields)
  - Audit logging for all changes
  - Geofencing for attendance validation (mobile-only enforcement)
  - Facial recognition with pgvector embeddings
  - Subscription-based licensing with trial period
  - Public API v1 with Bearer token auth
  - PWA with service worker caching
  - Minimalist auth UI (neutral tokens; Cuenti Work visual reference)

key_features:
  - Facial attendance tracking with liveness detection
  - Multi-branch management with geofence validation
  - Employee management with facial registration
  - Shift and incident tracking
  - Automated late arrival reports
  - Excel/PDF export for reports
  - Public API for integrations
  - Swagger UI documentation

